<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Maceolands</title>  
<style>  
body { font-family: Arial; padding: 20px; background: #fff8dc; }  
h1 { color: #d91c1c; }  
.menu-item { margin-bottom: 10px; }  
button { margin-left: 10px; padding: 5px 10px; background: #ffcc00; border: none; cursor: pointer; font-weight: bold; }  
#cartTotal { font-size: 18px; margin-top: 10px; }  
#chat { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }  
input { padding: 5px; width: 70%; }  
</style>  
</head>  
<body>  
  
<h1>🍔 Maceolands</h1>  
  
<h2>Menu</h2>  
<div id="menu"></div>  
  
<div id="cartTotal">Cart Total: $0</div>  
  
<h2>AI Assistant</h2>  
<input id="aiInput" placeholder="What should I eat?">  
<button id="askBtn">Ask</button>  
  
<div id="chat"></div>  
  
<script>  
// MENU DATA  
const menuItems = [  
{ id: "1", name: "Big Mac", price: 5 },  
{ id: "2", name: "McChicken", price: 4 },  
{ id: "3", name: "Fries", price: 2 }  
];  
  
let cart = [];  
  
// RENDER MENU  
const menuDiv = document.getElementById('menu');  
menuItems.forEach(item => {  
const div = document.createElement('div');  
div.className = 'menu-item';  
div.innerHTML = `${item.name} - $${item.price} <button onclick="addToCart('${item.id}')">Add</button>`;  
menuDiv.appendChild(div);  
});  
  
// ADD TO CART  
function addToCart(id) {  
const item = menuItems.find(i => i.id === id);  
const existing = cart.find(c => c.id === id);  
if(existing) existing.quantity += 1;  
else cart.push({...item, quantity: 1});  
updateTotal();  
}  
  
// UPDATE TOTAL  
function updateTotal() {  
const total = cart.reduce((sum, i) => sum + i.price * i.quantity, 0);  
document.getElementById('cartTotal').innerText = `Cart Total: $${total}`;  
}  
  
// AI ASSISTANT (SIMULATED)  
function appendChat(msg) {  
const chatDiv = document.getElementById('chat');  
const p = document.createElement('p');  
p.innerText = msg;  
chatDiv.appendChild(p);  
}  
  
document.getElementById('askBtn').addEventListener('click', () => {  
const input = document.getElementById('aiInput').value;  
if(!input) return;  
appendChat("You: " + input);  
  
// SIMULATED AI RESPONSE  
const options = [  
"I recommend the Big Mac!",  
"Fries go perfectly with a McChicken.",  
"Try our special combo today!",  
"How about a salad for a healthy choice?"  
];  
const reply = options[Math.floor(Math.random()*options.length)];  
appendChat("AI: " + reply);  
  
document.getElementById('aiInput').value = '';  
});  
</script>  
  
</body>  
</html>
